fetch: 
    
    output_path: data/raw/forex_data.csv

preprocess:
    input_path: data/raw/forex_data.csv
    X_train_path: data/processed/predetors/train/forex_data_processed_train.csv
    X_test_path: data/processed/predetors/test/forex_data_processed_test.csv
    y_train_path: data/processed/target/train/forex_data_processed_train_labels.csv
    y_test_path: data/processed/target/test/forex_data_processed_test_labels.csv
    test_days: 7
    n_lags: 5
    
train:
    X_train_path: data/processed/predetors/train/forex_data_processed_train.csv
    X_test_path: data/processed/predetors/test/forex_data_processed_test.csv
    y_train_path: data/processed/target/train/forex_data_processed_train_labels.csv
    y_test_path: data/processed/target/test/forex_data_processed_test_labels.csv
    model: models/model.pkl
    param_grid:
        n_estimators: [50, 100, 200]
        max_depth: [3, 5, 7]
        min_samples_split: [2, 5, 10]
        min_samples_leaf: [1, 2, 4]

    
    