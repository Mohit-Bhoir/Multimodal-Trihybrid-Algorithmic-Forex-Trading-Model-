fetch:  
    output_path: data/raw/forex_data.csv

preprocess:
    input_path: data/raw/forex_data.csv
    train_path: data/processed/train/forex_data_processed_train.csv
    test_path: data/processed/test/forex_data_processed_test.csv
    test_days: 7
    
train:
    train_path: data/processed/train/forex_data_processed_train.csv
    model_path: models/model.pkl
    test_days: 7
    n_lags: 5
    param_grid:
        - solver: [lbfgs]
          penalty: [l2]
          C: [0.01, 0.1, 1.0, 10.0]
          max_iter: [500, 1000]
        - solver: [saga]
          penalty: [l1, l2]
          C: [0.01, 0.1, 1.0, 10.0]
          max_iter: [500, 1000]

    
    