# docker-compose.override.yml — extra bind-mounts for Astro Airflow containers
#
# Astro CLI merges this file automatically when you run `astro dev start`.
# Docker Compose does NOT use this file when running the Streamlit service
# (use `docker compose -f docker-compose.streamlit.yml up --build -d` instead).
#
# Inside the Airflow containers the project root is /usr/local/airflow, so:
#   data/backtest/  → /usr/local/airflow/data/backtest/
#   src/oanda.cfg   → /usr/local/airflow/src/oanda.cfg

services:
  # Remap Airflow webserver from 8080 → 8082 (8080 is used by Docker Desktop)
  webserver:
    ports:
      - "8082:8080"
    volumes:
      - ./data/backtest:/usr/local/airflow/data/backtest
      - ./src/oanda.cfg:/usr/local/airflow/src/oanda.cfg:ro

  # Do NOT expose Postgres on the host — Airflow containers use the
  # internal Docker network. This avoids conflict with port 5432.
  postgres:
    ports: []

  scheduler:
    volumes:
      - ./data/backtest:/usr/local/airflow/data/backtest
      - ./src/oanda.cfg:/usr/local/airflow/src/oanda.cfg:ro

  triggerer:
    volumes:
      - ./data/backtest:/usr/local/airflow/data/backtest
      - ./src/oanda.cfg:/usr/local/airflow/src/oanda.cfg:ro

